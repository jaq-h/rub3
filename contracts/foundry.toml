[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[rpc_endpoints]
base         = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base         = { key = "${BASESCAN_API_KEY}", chain = "base"         }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = "base-sepolia" }
